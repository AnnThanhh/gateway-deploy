name: cd

on:
   workflow_run:
       workflows: ['ci']
       types:
           - completed

jobs:
    start:
        runs-on: node_55

        steps:
            - name: dừng container be
              run: sudo docker container stop con-gateway-dc

            - name: xóa container be
              run: sudo docker container remove con-gateway-dc

            - name: xóa image be
              run: sudo docker image remove tathanh26/img-gateway

            - name: chạy lại source
              working-directory: /home/ubuntu/nestjs
              run: sudo docker compose up -d
